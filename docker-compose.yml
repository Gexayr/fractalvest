services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    ports:
      - "${DB_PORT:-54321}:5432"
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fractionalvest}
      POSTGRES_USER: ${POSTGRES_USER:-fvuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fvpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fvuser} -d ${POSTGRES_DB:-fractionalvest}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Database migrations (runs once, then exits) ────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fvuser}:${POSTGRES_PASSWORD:-fvpassword}@db:5432/${POSTGRES_DB:-fractionalvest}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── API server ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    environment:
      PORT: ${API_PORT:-8080}
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-fvuser}:${POSTGRES_PASSWORD:-fvpassword}@db:5432/${POSTGRES_DB:-fractionalvest}
      SESSION_SECRET: ${SESSION_SECRET:-change-this-secret-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ── Frontend (nginx) ───────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - api

volumes:
  postgres_data:
